<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="28" rx="12" fill="white" opacity="0.06"/>
  <!-- Wallet -->
  <rect x="10" y="18" width="38" height="26" rx="5" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="10" y="18" width="38" height="9" rx="5" fill="white" opacity="0.1"/>
  <rect x="10" y="22" width="38" height="5" fill="white" opacity="0.07"/>
  <!-- Coin circle -->
  <circle cx="40.5" cy="31" r="5" fill="white" opacity="0.2" stroke="white" stroke-width="1" stroke-opacity="0.5"/>
  <text x="40.5" y="34" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="6" font-weight="900" fill="white" opacity="0.9">$</text>
  <!-- Card lines -->
  <rect x="14" y="27" width="16" height="2" rx="1" fill="white" opacity="0.5"/>
  <rect x="14" y="31" width="10" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
  <!-- Trend line -->
  <polyline points="11,52 20,46 28,49 38,42 52,37" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <polyline points="48,35 52,37 50,41" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <circle cx="20" cy="46" r="1.5" fill="#A5F3FC" opacity="0.9"/>
  <circle cx="28" cy="49" r="1.5" fill="#A5F3FC" opacity="0.9"/>
  <circle cx="38" cy="42" r="1.5" fill="#A5F3FC" opacity="0.9"/>
</svg>
