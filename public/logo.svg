<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A5F3FC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F46E5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="2" y="2" width="60" height="30" rx="12" fill="white" opacity="0.07"/>

  <!-- Wallet body -->
  <rect x="10" y="18" width="38" height="26" rx="5" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Wallet flap -->
  <rect x="10" y="18" width="38" height="10" rx="5" fill="white" opacity="0.12"/>
  <rect x="10" y="23" width="38" height="5" fill="white" opacity="0.08"/>

  <!-- Coin slot -->
  <rect x="36" y="26" width="9" height="10" rx="4.5" fill="white" opacity="0.25" stroke="white" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="40.5" cy="31" r="3" fill="white" opacity="0.5"/>

  <!-- Dollar sign on coin -->
  <text x="40.5" y="34.5" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="5" font-weight="900" fill="#6366F1" opacity="0.9">$</text>

  <!-- Card lines inside wallet -->
  <rect x="14" y="27" width="16" height="2" rx="1" fill="white" opacity="0.5"/>
  <rect x="14" y="31" width="10" height="2" rx="1" fill="white" opacity="0.35"/>

  <!-- Upward trend line at bottom -->
  <polyline
    points="11,52 20,46 28,49 38,42 52,37"
    stroke="url(#chartGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Arrow head -->
  <polyline
    points="48,35 52,37 50,41"
    stroke="url(#chartGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Small dot on trend line points -->
  <circle cx="20" cy="46" r="1.5" fill="#A5F3FC" opacity="0.8"/>
  <circle cx="28" cy="49" r="1.5" fill="#A5F3FC" opacity="0.8"/>
  <circle cx="38" cy="42" r="1.5" fill="#A5F3FC" opacity="0.8"/>
</svg>
